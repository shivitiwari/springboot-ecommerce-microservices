spring.application.name=api-gateway

# ================= SERVER PORT =================
server.port=8080

# ================= EUREKA CLIENT =================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
# How often gateway fetches registry from Eureka (default 30s)
eureka.client.registry-fetch-interval-seconds=30
# Instance lease renewal (heartbeat every 10s)
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ================= JWT SECRET =================
# MUST BE IDENTICAL across api-gateway, user-service, product-service, order-service
jwt.secret=dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0YXV0aGVudGljYXRpb25vbmxpbmVzaG9wcGluZw==

# ================= REDIS =================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
# Connection pool settings to prevent connection exhaustion
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms

# ================= RATE LIMITING (Custom RateLimitingFilter) =================
rate.limit.requests-per-minute=100

# ================= CACHE TTL (Custom RedisCacheFilter) =================
cache.ttl.seconds=300

# ================= LOAD BALANCER =================
# Prefer Eureka discovery over config-based (default: true)
spring.cloud.loadbalancer.ribbon.enabled=false


# ================= GATEWAY GLOBAL TIMEOUT =================
# If downstream service doesn't respond within these limits, return 504/503
spring.cloud.gateway.httpclient.connect-timeout=3000
spring.cloud.gateway.httpclient.response-timeout=10s

# ================= CORS =================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# ================= LOGGING =================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.onlineshopping=DEBUG
# Uncomment below to debug Redis commands
# logging.level.io.lettuce.core=DEBUG

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,gateway,metrics,circuitbreakers
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always
